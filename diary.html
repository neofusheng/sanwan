<script>
// Load diary data from JSON (穷人数据库 😂)
let diaries = {};
let diaryKeys = [];

async function loadDiaries() {
  try {
    const res = await fetch('data/diaries.json');
    const entries = await res.json();
    entries.forEach(e => { diaries[e.id] = e; });
    diaryKeys = entries.map(e => e.id);
    renderDiaryGrid();
    // Check URL hash
    const hash = location.hash.replace('#','');
    if (diaries[hash]) showDiary(hash);
  } catch(err) {
    console.error('Failed to load diaries:', err);
  }
}

function renderDiaryGrid() {
  const grid = document.querySelector('.diary-grid');
  if (!grid) return;
  grid.innerHTML = '';
  diaryKeys.forEach(key => {
    const d = diaries[key];
    const card = document.createElement('a');
    card.className = 'diary-card' + (key === diaryKeys[0] ? ' continuing' : '');
    card.onclick = function(){ showDiary(key); return false; };
    card.innerHTML = '<img src="' + (d.thumb || d.img) + '" alt="' + d.title + '" style="width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-bottom:2px solid #eee" loading="lazy">'
      + '<div class="info"><span class="day">' + d.title.split('：')[0] + '</span>'
      + '<h3>' + (d.title.split('：')[1] || d.title) + '</h3></div>';
    grid.appendChild(card);
  });
}

function showDiary(key){
  const d = diaries[key];
  if(!d) return;
  
  
  document.getElementById('diaryModalBody').innerHTML = '<h2 style="font-family:Comic Sans MS,cursive;font-size:22px;margin-bottom:16px">' + d.title + '</h2><img loading="lazy" src="' + d.img + '" style="width:100%;border-radius:8px;border:2px solid #ddd;margin-bottom:16px"><div style="font-size:15px;line-height:1.8;color:#333">' + d.text + '</div>';
  document.getElementById('diaryModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  history.replaceState(null, '', '#' + key);
  // Update nav
  const idx = diaryKeys.indexOf(key);
  document.getElementById('btnPrevTop').style.visibility = idx > 0 ? 'visible' : 'hidden';
  document.getElementById('btnNextTop').style.visibility = idx < diaryKeys.length - 1 ? 'visible' : 'hidden';
  document.getElementById('diaryPageNumTop').textContent = (idx+1) + ' / ' + diaryKeys.length;
  document.getElementById('btnPrev').style.visibility = idx > 0 ? 'visible' : 'hidden';
  document.getElementById('btnNext').style.visibility = idx < diaryKeys.length - 1 ? 'visible' : 'hidden';
  document.getElementById('diaryPageNum').textContent = (idx+1) + ' / ' + diaryKeys.length;
}

function closeDiary(){
  document.getElementById('diaryModal').style.display='none';
  document.body.style.overflow='';
  history.replaceState(null,'','#');
}

function prevDiary(){
  const keys = diaryKeys;
  const current = location.hash.replace('#','');
  const idx = keys.indexOf(current);
  if(idx > 0) showDiary(keys[idx-1]);
}

function nextDiary(){
  const keys = diaryKeys;
  const current = location.hash.replace('#','');
  const idx = keys.indexOf(current);
  if(idx < keys.length-1) showDiary(keys[idx+1]);
}

// Keyboard navigation
document.addEventListener('keydown', function(e){
  if(document.getElementById('diaryModal').style.display==='flex'){
    if(e.key==='Escape') closeDiary();
    if(e.key==='ArrowLeft') prevDiary();
    if(e.key==='ArrowRight') nextDiary();
  }
});

// Load on page ready
loadDiaries();
</script>

<script>
// 🦋 三万蝴蝶升级版飞行动画 v2
(function(){
  var el = document.getElementById('floatMascot');
  var img = el ? el.querySelector('.float-lobster') : null;
  if (!el || !img) return;

  var EW = 100, EH = 165;
  var NAV = 76;
  var curX = 0, curY = 0;

  function rand(a, b) { return a + Math.random() * (b - a); }

  function nextPos() {
    var W = window.innerWidth, H = window.innerHeight;
    var minX = 14, maxX = W - EW - 14;
    var minY = NAV + 10, maxY = H - EH - 14;
    var nx, ny, tries = 0;
    do {
      nx = rand(minX, maxX);
      ny = rand(minY, maxY);
      tries++;
    } while (tries < 15 &&
      Math.abs(nx - curX) < W * 0.25 &&
      Math.abs(ny - curY) < H * 0.18);
    return { x: nx, y: ny };
  }

  function fly() {
    var pos = nextPos();
    var nx = pos.x, ny = pos.y;
    var dx = nx - curX;
    var tilt = dx > 0
      ? rand(6, 14)
      : dx < 0
        ? rand(-14, -6)
        : rand(-4, 4);

    var dur = rand(2800, 3500);
    var durS = (dur / 1000).toFixed(2) + 's';
    var ease = 'cubic-bezier(0.4,0.05,0.6,0.95)';

    img.style.animation = 'none';
    img.style.transition = 'transform ' + durS + ' ' + ease;
    img.style.transform  = 'rotate(' + tilt + 'deg)';

    el.style.transition = 'left ' + durS + ' ' + ease + ', top ' + durS + ' ' + ease;
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
    curX = nx; curY = ny;

    el.style.flexDirection = (ny < NAV + 35) ? 'column-reverse' : 'column';

    setTimeout(function() {
      img.style.transition = 'transform 0.5s ease-out';
      img.style.transform  = '';
      setTimeout(function() {
        img.style.animation  = 'mascot-bob 3s ease-in-out infinite';
        img.style.transition = 'transform .2s';
      }, 550);
    }, dur + 100);

    setTimeout(fly, dur + rand(3000, 5500));
  }

  curX = window.innerWidth  - EW - 18;
  curY = window.innerHeight - EH - 18;
  el.style.bottom = 'auto';
  el.style.right  = 'auto';
  el.style.left   = curX + 'px';
  el.style.top    = curY + 'px';

  setTimeout(fly, 1800);
})();
</script>
