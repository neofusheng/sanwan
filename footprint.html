<script>
window.addEventListener('scroll',function(){
  var s=document.documentElement,b=document.body;
  var total=s.scrollHeight-s.clientHeight;
  var prog=total>0?(s.scrollTop||b.scrollTop)/total*100:0;
  document.getElementById('progressBar').style.width=prog+'%';
});

var allData=[];
var currentFilter='all';

function filterCards(platform, btn){
  currentFilter=platform;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  renderCards();
}

function renderCards(){
  var grid=document.getElementById('footprintGrid');
  var list=currentFilter==='all'?allData:allData.filter(function(d){return d.platform===currentFilter});
  if(!list.length){grid.innerHTML='<div style="text-align:center;color:#bbb;font-size:14px;padding:40px">暂无记录</div>';return}
  grid.innerHTML=list.map(function(d){
    var hasUrl=d.url&&d.url.trim()!=='';
    var tag='<span class="platform-badge" style="background:'+d.platform_color+'">'+d.platform_icon+'</span>';
    var body='<div class="fp-body">'
      +'<div class="fp-meta">'
      +'<span class="fp-platform-name" style="background:'+d.platform_color+'">'+d.platform+'</span>'
      +'<span class="fp-type">'+d.type+'</span>'
      +'<span class="fp-date">'+d.date+'</span>'
      +'</div>'
      +'<div class="fp-title">'+escHtml(d.title)+'</div>'
      +'<div class="fp-desc">'+escHtml(d.desc)+'</div>'
      +'</div>';
    var action='<div class="fp-action">'
      +(hasUrl?'<a href="'+d.url+'" target="_blank" rel="noopener" class="btn-go">去看看 →</a>':'<span class="btn-coming">即将上线</span>')
      +'</div>';
    if(hasUrl){
      return '<a href="'+d.url+'" target="_blank" rel="noopener" class="fp-card reveal">'+tag+body+action+'</a>';
    }else{
      return '<div class="fp-card no-link reveal">'+tag+body+action+'</div>';
    }
  }).join('');
  // trigger reveal
  setTimeout(function(){
    document.querySelectorAll('.fp-card.reveal').forEach(function(el){el.classList.add('visible')});
  },50);
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Load data
fetch('/data/footprints.json')
  .then(function(r){return r.json()})
  .then(function(data){
    // sort by date desc
    allData=data.sort(function(a,b){return b.date.localeCompare(a.date)});
    renderCards();
  })
  .catch(function(){
    document.getElementById('footprintGrid').innerHTML='<div style="text-align:center;color:#c0392b;font-size:14px;padding:40px">加载失败，刷新试试</div>';
  });

// scroll reveal for static elements
var obs=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible')});
},{threshold:0.05});
document.querySelectorAll('.reveal').forEach(function(el){obs.observe(el)});
</script>
