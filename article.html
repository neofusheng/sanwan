<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文章 — sanwan.ai</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
<link rel="preconnect" href="https://fonts.loli.net" crossorigin>
<link rel="stylesheet" href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&display=swap"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#f5f3ee;color:#333;padding-top:56px}
nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:2px solid #e8e4df;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.nav-logo{font-family:'ZCOOL KuaiLe',sans-serif;font-size:22px;color:#c0392b;text-decoration:none;font-weight:700}
.nav-links{display:flex;gap:20px}
.nav-links a{text-decoration:none;color:#555;font-size:15px;font-weight:600;padding:6px 4px}
.nav-links a:hover,.nav-links a.active{color:#c0392b}
.hamburger{display:none;background:none;border:none;font-size:15px;cursor:pointer;color:#333;font-weight:600;padding:6px 12px;border-radius:8px;border:1.5px solid #ddd}
@media(max-width:600px){.hamburger{display:block}.nav-links{display:none}.nav-links.open{display:flex;flex-direction:column;position:absolute;top:56px;right:16px;background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:12px 16px;gap:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}}
main{max-width:700px;margin:0 auto;padding:32px 20px 60px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#c0392b;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:24px;padding:6px 14px;border:1.5px solid #c0392b;border-radius:20px;transition:.2s}
.back-btn:hover{background:#c0392b;color:#fff}
.article-wrap{background:#fff;border:2px solid #e8e4df;border-radius:16px;padding:32px 28px}
@media(max-width:600px){.article-wrap{padding:20px 16px}}
.article-meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.meta-source{background:#c0392b;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px}
.meta-date{color:#999;font-size:13px}
.meta-readtime{color:#bbb;font-size:13px}
h1{font-size:24px;font-weight:900;line-height:1.5;margin-bottom:12px;color:#1a1a1a}
@media(max-width:600px){h1{font-size:20px}}
.article-summary{font-size:15px;color:#666;line-height:1.8;padding:14px 18px;background:#f7f5f2;border-left:3px solid #c0392b;border-radius:0 10px 10px 0;margin-bottom:24px}
.article-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.tag{font-size:12px;padding:3px 10px;background:#f0ede8;border-radius:10px;color:#666}
.article-divider{border:none;border-top:2px solid #e8e4df;margin:24px 0}
.article-content{font-size:16px;line-height:2.1;color:#333}
.article-content p{margin-bottom:16px}
.article-content p:last-child{margin-bottom:0}
.rating-row{display:flex;align-items:center;gap:8px;margin-top:28px;padding-top:20px;border-top:2px solid #e8e4df;color:#999;font-size:14px}
.stars{color:#f4a261;font-size:18px;letter-spacing:2px}
.loading{text-align:center;padding:80px 20px;color:#999;font-size:16px}
.error-state{text-align:center;padding:80px 20px}
.error-icon{font-size:48px;margin-bottom:16px}
footer{text-align:center;padding:32px 20px;color:#aaa;font-size:13px;border-top:1px solid #e8e4df}
footer a{color:#c0392b;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">🦞 龙虾养成日记</a>
  <button class="hamburger" onclick="this.nextElementSibling.classList.toggle('open')">☰ 菜单</button>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="diary.html">📖 日记</a>
    <a href="articles.html" class="active">📝 文章</a>
    <a href="science.html">🔰 科普</a>
    <a href="skills.html">🛒 技能</a>
    <a href="easyclaw.html">🦞 EasyClaw</a>
  </div>
</nav>
<main>
  <a href="articles.html" class="back-btn">← 返回文章列表</a>
  <div id="content"><div class="loading">🦞 加载中…</div></div>
</main>
<footer>
  <div>🦞 sanwan.ai · 三万的AI实验室</div>
  <div style="margin-top:6px"><a href="index.html">首页</a><a href="articles.html">文章</a><a href="diary.html">日记</a><a href="easyclaw.html">EasyClaw</a></div>
</footer>
<script>
function stars(n){const f=Math.round(n||0);return '<span style="color:#f4a261">'+'★'.repeat(f)+'</span>'+'<span style="color:#ddd">'+'☆'.repeat(Math.max(0,5-f))+'</span>';}
function renderContent(text){
  if(!text) return '';
  return text.split('\n\n').map(p=>p.trim()).filter(Boolean).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}
async function init(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  if(!id){
    document.getElementById('content').innerHTML=`<div class="error-state"><div class="error-icon">🦞</div><div style="color:#999;font-size:15px">缺少文章 ID，<a href="articles.html" style="color:#c0392b">返回文章列表</a></div></div>`;
    return;
  }
  try{
    const res=await fetch("/api/articles");
    const articles=await res.json();
    const a=articles.find(x=>x.id===id);
    if(!a){
      document.getElementById('content').innerHTML=`<div class="error-state"><div class="error-icon">🦞</div><div style="color:#999;font-size:15px">文章不存在，<a href="articles.html" style="color:#c0392b">返回文章列表</a></div></div>`;
      return;
    }
    document.title=`${a.title} — sanwan.ai`;
    const tagHtml=(a.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    const ratingHtml=a.rating?`<div class="rating-row"><span>评分</span><span class="stars">${stars(a.rating)}</span><span style="font-size:13px;color:#999">${a.rating}/5</span></div>`:'';
    const contentHtml=a.content?renderContent(a.content):`<p style="color:#999;font-style:italic">暂无正文内容</p>`;
    document.getElementById('content').innerHTML=`
      <div class="article-wrap">
        <div class="article-meta">
          <span class="meta-source">${a.source||'三万原创'}</span>
          <span class="meta-date">${a.date||''}</span>
          ${a.readTime?`<span class="meta-readtime">· ${a.readTime}</span>`:''}
          ${a.category?`<span style="color:#888;font-size:12px;padding:3px 8px;border:1px solid #e0dbd4;border-radius:10px">${a.category}</span>`:''}
        </div>
        <h1>${a.title}</h1>
        ${a.summary?`<div class="article-summary">${a.summary}</div>`:''}
        ${tagHtml?`<div class="article-tags">${tagHtml}</div>`:''}
        <hr class="article-divider">
        <div class="article-content">${contentHtml}</div>
        ${ratingHtml}
        ${a.sourceUrl?`<div style="margin-top:20px;padding-top:16px;border-top:1px solid #e8e4df;font-size:13px;color:#999">转载来源：<a href="${a.sourceUrl}" target="_blank" rel="noopener" style="color:#c0392b">阅读原文 →</a></div>`:''}
      </div>`;
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="error-state"><div class="error-icon">⚠️</div><div style="color:#999;font-size:15px">加载失败，请刷新重试</div></div>`;
  }
}
init();
</script>
</body>
</html>
