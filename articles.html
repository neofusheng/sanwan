.article-card{background:#fff;border:1.5px solid #e8e4df;border-radius:12px;padding:16px 18px;transition:.2s;cursor:pointer;text-decoration:none;color:inherit;display:block}

.article-card .summary{font-size:13px;color:#666;line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-card .meta{display:flex;align-items:center;gap:12px;font-size:12px;color:#999;flex-wrap:wrap}
.source-badge{background:#f0f0f0;padding:2px 8px;border-radius:4px;font-weight:600;color:#555}
.tag-badge{background:#fff5f5;color:#c0392b;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.rating{color:#f39c12}
.article-card .video-badge{background:#ff4757;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}

/* Empty state */

/* Floating mascot */

.float-lobster:hover{transform:scale(1.15) rotate(-5deg)}
.float-bubble{background:#fff;border:1.5px solid #f0d0cc;padding:10px 14px;border-radius:16px;text-align:center;margin-bottom:4px;box-shadow:0 4px 20px rgba(192,57,43,0.12);position:relative}
.bubble-tail{width:10px;height:10px;background:#fff;border-right:2px solid #f0d0cc;border-bottom:2px solid #f0d0cc;position:absolute;bottom:-6px;left:50%;transform:translateX(-50%) rotate(45deg)}
@keyframes mascot-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

<script>
let articles = [];
let currentFilter = '全部';

async function loadArticles() {
  try {
    const res = await fetch('data/articles.json');
    articles = await res.json();
    buildFilterTabs();
    filterArticles();
  } catch(err) {
    console.error('Failed to load articles:', err);
  }
}

function buildFilterTabs() {
  const tabs = document.getElementById('filterTabs');
  const cats = {};
  articles.forEach(a => {
    const c = a.category || '其他';
    cats[c] = (cats[c] || 0) + 1;
  });
  
  let html = '<div class="filter-tab active" onclick="setFilter(\'全部\',this)">全部<span class="filter-count">(' + articles.length + ')</span></div>';
  const order = ['部署教程','使用技巧','进阶玩法','评测分析','视频教程'];
  order.forEach(cat => {
    if (cats[cat]) {
      html += '<div class="filter-tab" onclick="setFilter(\'' + cat + '\',this)">' + cat + '<span class="filter-count">(' + cats[cat] + ')</span></div>';
    }
  });
  tabs.innerHTML = html;
}

function setFilter(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  filterArticles();
}

function filterArticles() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  let filtered = articles;
  
  if (currentFilter !== '全部') {
    filtered = filtered.filter(a => a.category === currentFilter);
  }
  
  if (query) {
    filtered = filtered.filter(a => {
      const searchText = (a.title + ' ' + a.summary + ' ' + (a.tags||[]).join(' ') + ' ' + a.source).toLowerCase();
      return searchText.includes(query);
    });
  }
  
  renderArticles(filtered);
}

function renderArticles(list) {
  const container = document.getElementById('articleList');
  const empty = document.getElementById('emptyState');
  const stats = document.getElementById('statsBar');
  
  stats.innerHTML = '<span>📊 共 <strong>' + list.length + '</strong> 篇文章</span>' +
    '<span>🔄 每日更新</span>';
  
  if (list.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  container.innerHTML = list.map(a => {
    const stars = '⭐'.repeat(a.rating || 3);
    const isVideo = (a.tags || []).some(t => t.includes('视频'));
    const videoBadge = isVideo ? '<span class="video-badge">▶ 视频</span>' : '';
    const tagHtml = (a.tags || []).slice(0, 3).map(t => '<span class="tag-badge">' + t + '</span>').join('');
    
    return '<a class="article-card" href="' + a.sourceUrl + '" target="_blank" rel="noopener">' +
      '<h3>' + a.title + '</h3>' +
      '<div class="summary">' + a.summary + '</div>' +
      '<div class="meta">' +
        '<span class="source-badge">' + a.source + '</span>' +
        videoBadge +
        tagHtml +
        '<span class="rating">' + stars + '</span>' +
        '<span>📖 ' + (a.readTime || '5min') + '</span>' +
      '</div>' +
    '</a>';
  }).join('');
}

loadArticles();
</script>
